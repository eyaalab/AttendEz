<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-login">

<div class="card">
  <h2>Teacher</h2>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="pass" placeholder="Password"><br><br>

  <button onclick="login()">LOGIN</button>

  <p id="msg" style="color:red;"></p>
</div>

<script>
function login(){

  const role = localStorage.getItem("role");
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  const studentEmail = "student@attendez.com";
  const studentPass = "123456";

  const teacherEmail = "teacher@attendez.com";
  const teacherPass = "123456";

  if(role === "student"){
    if(email === studentEmail && pass === studentPass){
      window.location.href = "student-dashboard.html";
    }else{
      document.getElementById("msg").innerText = "Access Denied";
    }
  }

  if(role === "teacher"){
    if(email === teacherEmail && pass === teacherPass){
      window.location.href = "teacher-dashboard.html";
    }else{
      document.getElementById("msg").innerText = "Access Denied";
    }
  }

}
</script>

</body>
</html>
