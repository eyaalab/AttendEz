<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subjects</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Arial Black', Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('bg.png') center/cover no-repeat fixed;    background-size: cover;
    background-color: #7a8fa6;
  }

  .overlay {
    min-height: 100vh;
    background: rgba(255,255,255,0.08);
    padding-bottom: 60px;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
  }

  .logo-area h1 {
    font-size: 28px;
    font-weight: 900;
    color: #1a3a8f;
    letter-spacing: 1px;
  }

  .logo-area h1 span {
    color: #e8a020;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search {
    background: rgba(255,255,255,0.92);
    border: 1.5px solid #ddd;
    border-radius: 30px;
    padding: 8px 40px 8px 18px;
    font-size: 13px;
    outline: none;
    width: 220px;
    color: #333;
    transition: width 0.2s;
  }

  .search:focus {
    width: 280px;
    border-color: #aaa;
  }

  .search-icon {
    position: absolute;
    right: 12px;
    cursor: pointer;
    font-size: 15px;
    color: #666;
    background: none;
    border: none;
    padding: 0;
  }

  /* NO RESULTS */
  .no-results {
    display: none;
    text-align: center;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    margin-top: 10px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }

  /* SECTION TITLE */
  .section-title {
    font-size: 30px;
    font-weight: 900;
    color: #111;
    padding: 8px 24px 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* SUBJECTS GRID */
  .subjects-grid {
    display: grid;
    grid-template-columns: repeat(2, auto);
    gap: 18px 24px;
    justify-content: center;
    padding: 0 24px;
    max-width: 800px;
    margin: 0 auto;
  }

  .subject-btn {
    background: rgba(255,255,255,0.95);
    border: none;
    border-radius: 50px;
    padding: 18px 36px;
    font-size: 15px;
    font-weight: 800;
    color: #111;
    cursor: pointer;
    min-width: 260px;
    max-width: 320px;
    text-align: center;
    line-height: 1.3;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
  }

  .subject-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    background: #fff;
  }

  .subject-btn:active {
    transform: scale(0.97);
  }

  .subject-btn.hidden {
    display: none;
  }
</style>
</head>
<body>
<div class="overlay">

  <header class="topbar">
    <div class="logo-area">
      <h1>Attend<span>EZ</span></h1>
    </div>
    <div class="search-wrap">
      <input type="text" class="search" id="searchInput" placeholder="Search Bar..." oninput="filterSubjects()">
      <button class="search-icon" onclick="filterSubjects()">🔍</button>
    </div>
  </header>

  <h2 class="section-title" id="sectionTitle">SECTION</h2>
  <div class="no-results" id="noResults">No subjects found.</div>
  <div class="subjects-grid" id="subjects"></div>

</div>

<script>
  const section = localStorage.getItem("sectionName") || "STEM - AMOS";
  document.getElementById("sectionTitle").innerText = section;

  let strand = section.split(" - ")[0];

  const subjectData = {
    "HUMSS": [
      "Media Information Literacy",
      "Physical Science",
      "Culminating Activity",
      "Community Engagement Solidarity And Citizenship",
      "Philosophy of the Human Person",
      "Trends Networks And Critical Thinking",
      "Filipino Sa Piling Larangan"
    ],
    "ADT": [
      "Philosophy",
      "Media and Information Literacy",
      "Filipino sa Piling Larang",
      "Physical Science",
      "Physical Education and Health 4",
      "Performing Arts",
      "PA8",
      "PA9"
    ],
    "STEM": [
      "Research Capstone Project",
      "Entrepreneurship",
      "Disaster Readiness Risk Reduction",
      "General Biology 2",
      "General Physics 2",
      "Physical Education and Health 4",
      "Philosophy of the Human Person",
      "Information and Communication Technology"
    ],
    "ABM": [
      "Understanding Culture Society and Politics",
      "Inquiries Investigations and Immersion",
      "Entrepreneurship",
      "Business Ethics and Social Responsibility",
      "Business Enterprise Simulation",
      "Physical Education and Health 4"
    ],
    "TVL ICT": [
      "Introduction To Philosophy of the Human Person",
      "Media and Information Literacy",
      "Filipino sa Piling Larangan",
      "Physical Science",
      "PEH",
      "ICT 7 Oracle",
      "ICT 8",
      "ICT 9"
    ],
    "TVL COOK": [
      "Philosophy",
      "Media Information Literacy",
      "Physical Science",
      "Filipino sa Piling Larangan",
      "Cookery 7",
      "Cookery 8",
      "Cookery 9"
    ]
  };

  const list = subjectData[strand] || [];
  const container = document.getElementById("subjects");

  list.forEach(sub => {
    const btn = document.createElement("button");
    btn.className = "subject-btn";
    btn.innerText = sub;
    btn.dataset.name = sub.toLowerCase();
    btn.onclick = () => {
      localStorage.setItem("subjectName", sub);
      window.location.href = "attendance.html";
    };
    container.appendChild(btn);
  });

  function filterSubjects() {
    const query = document.getElementById("searchInput").value.toLowerCase().trim();
    const buttons = container.querySelectorAll(".subject-btn");
    let visibleCount = 0;

    buttons.forEach(btn => {
      if (btn.dataset.name.includes(query)) {
        btn.classList.remove("hidden");
        visibleCount++;
      } else {
        btn.classList.add("hidden");
      }
    });

    document.getElementById("noResults").style.display = visibleCount === 0 ? "block" : "none";
  }
</script>
</body>
</html>
